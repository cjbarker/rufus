version: 2

project_name: rufus

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: rufus
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/cjbarker/rufus/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto
